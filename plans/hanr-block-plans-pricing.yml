specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: H&R Block
providerId: hanr-block
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Tax Preparation
  - Financial Services
description: H&R Block sells tax-preparation software and services directly to consumers and small
  businesses. There is no public developer API or plan catalog; any partner / integration access is
  via bilateral agreement (e.g. with employers, financial institutions, or partner software).
notes: No public API plans or pricing are published. The placeholder Enterprise plan records the
  expected commercial shape; reconcile against the partner agreement.
sources:
  - https://www.hrblock.com/
plans:
  - id: hanr-block-enterprise
    name: Enterprise / Partner
    type: enterprise
    description: Bilateral partner agreement for tax-data integration (employer W-2 imports, fintech
      partnerships, etc.). Contract-defined volumes and SLAs.
    entries:
      - label: Plan price
        description: Custom-quoted via the partner agreement
        name: plan_price
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: US
        domains:
          - https://api.hrblock.com
        unit: 1
        price: contact sales
        userMultiplied: false
    elements:
      - name: Partner Account Manager
      - name: H&R Block API
maintainers:
