specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: H&R Block
providerId: hanr-block
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Tax Preparation
  - Financial Services
  - Rate Limiting
  - Quotas
  - Throttling
description: H&R Block does not publish a public API rate-limit document. Throttling is governed
  by the partner agreement and is likely tightened during peak tax-filing season (Jan–Apr).
notes: No public rate-limit documentation could be located. Expect seasonal throttling for any
  partner integration.
sources:
  - https://www.hrblock.com/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - tier: enterprise
    name: Contract-defined per-partner limit
    scope: partner
    metric: varies
    limit: see partner agreement
    applies:
      - H&R Block API
policies:
  - name: Backoff Strategy
    description: Honor Retry-After on 429 and back off with exponential jitter on transient 5xx.
  - name: Seasonal Capacity
    description: Tax-filing season (January–April) drives peak load; integrations should be
      capacity-tested ahead of January.
  - name: Partner Scoping
    description: Limits are enforced per partner credential.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
