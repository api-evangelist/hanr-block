specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
provider: H&R Block
providerId: hanr-block
publisherName: HRB Tax Group, Inc.
serviceCategory: Tax Preparation / Financial Services Partner API
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Tax Preparation
  - Financial Services
  - FinOps
  - Cost Management
  - FOCUS
description: 'FOCUS-aligned FinOps placeholder for H&R Block: no public commercial API. Partner
  integrations are bilaterally contracted; meters describe partner-side allocation across tax-season
  workloads.'
notes: No public commercial model is published. Reconcile against the partner agreement.
sources:
  - https://www.hrblock.com/
principles:
  - name: Visibility
    description: Track partner-integration request volume via the H&R Block partner gateway logs;
      pay particular attention to peak tax-season throughput.
  - name: Allocation
    description: Allocate integration cost across partner business lines (employer W-2 imports,
      fintech partnerships, retail-channel referrals).
  - name: Optimization
    description: Cache static reference data; batch tax-document lookups; pre-warm capacity ahead
      of January–April peak.
  - name: Accountability
    description: Designate a partner-program owner; review API utilization quarterly with extra
      review post-tax-season.
domains:
  - name: Understand Usage and Cost
    capabilities:
      - Data Ingestion
      - Allocation
      - Reporting and Analytics
      - Anomaly Management
  - name: Quantify Business Value
    capabilities:
      - Planning and Estimating
      - Forecasting
      - Budgeting
      - Benchmarking
      - Unit Economics
  - name: Optimize Usage and Cost
    capabilities:
      - Architecting for Cloud
      - Rate Optimization
      - Workload Optimization
      - Cloud Sustainability
      - Licensing and SaaS
  - name: Manage the FinOps Practice
    capabilities:
      - FinOps Practice Operations
      - FinOps Education and Enablement
      - Invoicing and Chargeback
      - Onboarding Workloads
      - Intersecting Disciplines
billingModel:
  pricingCategory: Subscription
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
  chargeFrequency: Recurring
focusColumns:
  ServiceName: H&R Block API
  ServiceCategory: Tax Preparation / Financial Services Partner API
  ProviderName: H&R Block
  PublisherName: HRB Tax Group, Inc.
  InvoiceIssuerName: HRB Tax Group, Inc.
  PricingCategory: Subscription
  PricingUnit: partner-agreement
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: api_requests
    description: Partner-integration request volume (allocation meter)
    unit: request
    aggregation: sum
    dimensions:
      - partner
      - endpoint
      - season
  - name: tax_documents_imported
    description: Tax documents (W-2, 1099, etc.) imported via partner integrations
    unit: document
    aggregation: sum
    dimensions:
      - partner
      - document_type
apis:
  - name: H&R Block API
    baseURL: https://api.hrblock.com
    tags:
      - Tax Preparation
      - Financial Services
    serviceName: H&R Block API
    serviceCategory: API
unitEconomics:
  - name: Cost per Tax-Filing Season
    metric: billed_cost / season
    target: TBD
  - name: Cost per Document Imported
    metric: billed_cost / tax_documents_imported
    target: TBD
maintainers:
